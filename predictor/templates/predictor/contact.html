{% extends "predictor/base.html" %}

{% block content %}

<div class="container py-5">

    <div class="text-center mb-4">
        <h2 class="fw-bold">Contact Us</h2>
        <p class="text-muted">Get in touch for queries or support</p>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow-sm p-4 border-0">

                <!-- Contact Info -->
                <div class="mb-4">
                    <h5>Contact Information</h5>
                    <p><strong>Project:</strong> Endoscopy AI System</p>
                    <p><strong>Email:</strong> info.projects@gmail.com</p>
                    <p><strong>Phone:</strong> +91 8500221170</p>
                    <p><strong>Location:</strong> India</p>
                </div>

                <hr>

                <!-- Contact Form (UI only) -->
                <h5 class="mb-3">Send a Message</h5>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" placeholder="Enter your name">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="Enter your email">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" rows="4" placeholder="Enter your message"></textarea>
                    </div>

                    <button type="submit" class="btn btn-dark w-100">
                        Send Message
                    </button>

                </form>

            </div>

        </div>
    </div>

</div>

{% endblock %}
