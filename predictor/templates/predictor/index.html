<!DOCTYPE html>
<html>
<head>

<title>Explainable AI Endoscopy Detection</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
}

.container{
width:80%;
margin:auto;
}

.upload-box{
margin-top:30px;
padding:20px;
background:white;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.images{
display:flex;
justify-content:space-around;
margin-top:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

img{
border-radius:10px;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Explainable AI for Endoscopy Disease Detection</h1>

<div class="upload-box">

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<input type="file" name="image">

<button type="submit">Predict</button>

</form>

</div>

{% if result %}

<h2>Prediction : {{ result }}</h2>

<div class="images">

<div class="card">

<h3>Uploaded Image</h3>

<img src="{{ image_url }}" width="350">

</div>

<div class="card">

<h3>GradCAM Heatmap</h3>

<img src="/{{ heatmap_url }}" width="350">

</div>

</div>

{% endif %}

</div>

</body>

</html>
